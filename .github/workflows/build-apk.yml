name: Build VoiceX APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Download Fonts
        run: |
          mkdir -p app/src/main/res/font
          wget -q "https://github.com/google/fonts/raw/refs/heads/main/ofl/orbitron/static/Orbitron-Bold.ttf" -O app/src/main/res/font/orbitron_bold.ttf || true
          cp app/src/main/res/font/orbitron_bold.ttf app/src/main/res/font/orbitron_regular.ttf || true
          wget -q "https://github.com/google/fonts/raw/refs/heads/main/ofl/rajdhani/Rajdhani-Medium.ttf" -O app/src/main/res/font/rajdhani_medium.ttf || true
      - name: Patch Fonts
        run: |
          for f in orbitron_bold orbitron_regular rajdhani_medium; do
            size=$(wc -c < "app/src/main/res/font/${f}.ttf" 2>/dev/null || echo 0)
            if [ "$size" -lt 5000 ]; then
              find app/src/main/res -name "*.xml" -exec sed -i "s|android:fontFamily=\"@font/${f}\"|android:fontFamily=\"sans-serif\"|g" {} \;
              rm -f "app/src/main/res/font/${f}.xml" "app/src/main/res/font/${f}.ttf"
            fi
          done
          sed -i 's|<item name="android:fontFamily">@font/rajdhani_medium</item>|<item name="android:fontFamily">sans-serif</item>|g' app/src/main/res/values/themes.xml || true
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: VoiceX-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
